<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="760" viewBox="0 0 1180 760" role="img" aria-labelledby="title desc">
  <title id="title">Udagram AWS architecture diagram</title>
  <desc id="desc">Internet traffic reaches an internet gateway, public application load balancer, private EC2 auto scaling group, NAT gateway, IAM role, and S3 bucket.</desc>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#334155"/>
    </marker>
    <style>
      .box { fill: #ffffff; stroke: #334155; stroke-width: 2; rx: 8; }
      .vpc { fill: #f8fafc; stroke: #0f766e; stroke-width: 3; rx: 10; }
      .public { fill: #ecfeff; stroke: #0891b2; stroke-width: 2; rx: 8; }
      .private { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 8; }
      .sg { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 8; }
      .data { fill: #eef2ff; stroke: #4f46e5; stroke-width: 2; rx: 8; }
      .title { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .label { font: 600 16px Arial, sans-serif; fill: #111827; }
      .small { font: 13px Arial, sans-serif; fill: #334155; }
      .arrow { stroke: #334155; stroke-width: 2.5; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
  </defs>

  <rect width="1180" height="760" fill="#ffffff"/>
  <text x="40" y="44" class="title">Udagram Web Application - AWS CloudFormation Architecture</text>

  <rect x="40" y="90" width="1100" height="560" class="vpc"/>
  <text x="62" y="122" class="label">VPC: 10.0.0.0/16</text>

  <rect x="75" y="160" width="490" height="190" class="public"/>
  <text x="95" y="190" class="label">Public Subnets</text>
  <text x="95" y="216" class="small">10.0.0.0/24 - AZ 1</text>
  <text x="95" y="237" class="small">10.0.1.0/24 - AZ 2</text>

  <rect x="615" y="160" width="490" height="190" class="private"/>
  <text x="635" y="190" class="label">Private Subnets</text>
  <text x="635" y="216" class="small">10.0.2.0/24 - AZ 1</text>
  <text x="635" y="237" class="small">10.0.3.0/24 - AZ 2</text>

  <rect x="95" y="265" width="180" height="56" class="box"/>
  <text x="120" y="299" class="label">NAT Gateway</text>

  <rect x="305" y="248" width="225" height="86" class="box"/>
  <text x="337" y="282" class="label">Application Load</text>
  <text x="365" y="306" class="label">Balancer</text>
  <text x="336" y="326" class="small">Internet-facing, HTTP :80</text>

  <rect x="648" y="250" width="205" height="82" class="box"/>
  <text x="684" y="281" class="label">Auto Scaling</text>
  <text x="700" y="305" class="label">Group</text>
  <text x="673" y="325" class="small">4 EC2 t2.micro instances</text>

  <rect x="880" y="250" width="190" height="82" class="box"/>
  <text x="912" y="281" class="label">Launch Template</text>
  <text x="912" y="305" class="small">Root volume: 10 GB</text>
  <text x="912" y="325" class="small">UserData installs nginx</text>

  <rect x="75" y="398" width="240" height="96" class="sg"/>
  <text x="97" y="430" class="label">Load Balancer SG</text>
  <text x="97" y="456" class="small">Inbound HTTP 80 from 0.0.0.0/0</text>
  <text x="97" y="477" class="small">Outbound all traffic</text>

  <rect x="345" y="398" width="260" height="96" class="sg"/>
  <text x="367" y="430" class="label">Web Server SG</text>
  <text x="367" y="456" class="small">Inbound HTTP 80 from ALB SG</text>
  <text x="367" y="477" class="small">Outbound all traffic</text>

  <rect x="660" y="398" width="210" height="96" class="data"/>
  <text x="697" y="430" class="label">IAM Role</text>
  <text x="693" y="456" class="small">EC2 instance profile</text>
  <text x="688" y="477" class="small">S3 GetObject / PutObject</text>

  <rect x="900" y="398" width="170" height="96" class="data"/>
  <text x="945" y="430" class="label">S3 Bucket</text>
  <text x="934" y="456" class="small">index.html</text>
  <text x="923" y="477" class="small">Static app content</text>

  <rect x="95" y="675" width="180" height="52" class="box"/>
  <text x="136" y="707" class="label">Internet User</text>

  <rect x="395" y="675" width="205" height="52" class="box"/>
  <text x="428" y="707" class="label">Internet Gateway</text>

  <path d="M275 701 H395" class="arrow"/>
  <path d="M498 675 V335" class="arrow"/>
  <path d="M530 291 H648" class="arrow"/>
  <path d="M853 291 H880" class="arrow"/>
  <path d="M475 398 V334" class="arrow"/>
  <path d="M605 446 H648" class="arrow"/>
  <path d="M765 398 V332" class="arrow"/>
  <path d="M870 446 H900" class="arrow"/>
  <path d="M750 332 V398" class="arrow dashed"/>
  <path d="M650 291 H565" class="arrow dashed"/>
  <path d="M185 265 V145 H498" class="arrow dashed"/>

  <text x="556" y="286" class="small">HTTP from ALB to EC2</text>
  <text x="770" y="374" class="small">Instance profile</text>
  <text x="882" y="374" class="small">S3 upload/read</text>
  <text x="230" y="150" class="small">Private subnet egress via NAT</text>
</svg>
